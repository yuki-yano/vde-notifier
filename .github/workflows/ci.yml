name: CI

on:
  push:
  pull_request:

jobs:
  swift:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7

      - name: Run strict Swift tests
        run: env -u LIBRARY_PATH swift test --package-path app/vde-notifier-app -Xswiftc -strict-concurrency=complete -Xswiftc -warnings-as-errors

      - name: Build and verify universal app bundle
        run: |
          EXPECTED_APP_VERSION="0.0.0-dev"
          if [[ "${GITHUB_REF_NAME}" =~ ^app-v[0-9]+(\.[0-9]+)*$ ]]; then
            EXPECTED_APP_VERSION="${GITHUB_REF_NAME#app-v}"
          fi

          APP_VERSION="${EXPECTED_APP_VERSION}" app/vde-notifier-app/scripts/build-app.sh
          plutil -lint build/VdeNotifierApp.app/Contents/Info.plist
          codesign --verify --deep --strict build/VdeNotifierApp.app
          xcrun lipo build/VdeNotifierApp.app/Contents/MacOS/vde-notifier-app -verify_arch arm64 x86_64
          test -x build/VdeNotifierApp.app/Contents/MacOS/vde-notifier
          xcrun lipo build/VdeNotifierApp.app/Contents/MacOS/vde-notifier -verify_arch arm64 x86_64
          test "$(build/VdeNotifierApp.app/Contents/MacOS/vde-notifier-app --version)" = "${EXPECTED_APP_VERSION}"
          build/VdeNotifierApp.app/Contents/MacOS/vde-notifier-app --help | grep -F "vde-notifier-app doctor"
          build/VdeNotifierApp.app/Contents/MacOS/vde-notifier --help | grep -F "Usage: vde-notifier"
          test "$(build/VdeNotifierApp.app/Contents/MacOS/vde-notifier --version)" = "${EXPECTED_APP_VERSION}"
